services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nourisher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nourisher
      MODEL_PATH: ml/models/finetuned-llama
      LOAD_IN_4BIT: "true"
      SYSTEM_PROMPT_PATH: configs/system_prompt.txt
    command: >
      sh -c "pip install -e . && uvicorn nourisher.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
